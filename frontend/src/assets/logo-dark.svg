<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Ikona: siatka kalendarza -->
  <rect x="2" y="2" width="44" height="44" rx="10" fill="#4F46E5"/>
  <!-- Linie siatki poziome -->
  <line x1="2" y1="16" x2="46" y2="16" stroke="white" stroke-width="2.5" stroke-opacity="0.6"/>
  <line x1="2" y1="30" x2="46" y2="30" stroke="white" stroke-width="2.5" stroke-opacity="0.6"/>
  <!-- Linie siatki pionowe -->
  <line x1="17" y1="16" x2="17" y2="46" stroke="white" stroke-width="2.5" stroke-opacity="0.6"/>
  <line x1="32" y1="16" x2="32" y2="46" stroke="white" stroke-width="2.5" stroke-opacity="0.6"/>
  <!-- Główki kalendarza (2 kółka u góry) -->
  <circle cx="16" cy="7" r="3" fill="white" fill-opacity="0.9"/>
  <circle cx="32" cy="7" r="3" fill="white" fill-opacity="0.9"/>
  <!-- Zaznaczony element siatki (aktywna komórka) -->
  <rect x="19" y="18" width="11" height="10" rx="2" fill="white" fill-opacity="0.25"/>

  <!-- Tekst: Chrono (jasny dla dark mode) -->
  <text x="56" y="32" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="700" font-size="22" fill="#f1f5f9">Chrono</text>
  <!-- Tekst: Grid (kolor indigo) -->
  <text x="134" y="32" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="700" font-size="22" fill="#818cf8">Grid</text>
</svg>
